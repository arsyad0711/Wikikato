<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boot Sequence - THE PHONIXXLZ110</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Courier New', monospace; }
        body { background-color:#0a0a0a; color:#00ff00; overflow:hidden; position:relative; }
        #matrix { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.2; }
        .terminal { position:absolute; top:10%; left:50%; transform:translateX(-50%); width:80%; max-width:800px; background:rgba(0,0,0,0.85); border:1px solid #00ff00; padding:20px; color:#00ff00; }
        .terminal-output { white-space:pre-wrap; line-height:1.4; min-height:200px; max-height:400px; overflow-y:auto; }
        .terminal-input { width:100%; background:rgba(0,0,0,0.9); border:1px solid #00ff00; color:#00ff00; padding:8px; font-family:'Courier New', monospace; }
        .radar { position:absolute; bottom:10px; right:10px; width:80px; height:80px; border:2px solid #00ff00; border-radius:50%; overflow:hidden; }
        .radar::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,255,0,0.2); animation:radar-spin 3s linear infinite; transform-origin:center; }
        @keyframes radar-spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="terminal" id="bootTerminal">
        <div id="terminalOutput" class="terminal-output"></div>
        <input id="terminalInput" class="terminal-input" placeholder=">" autocomplete="off">
    </div>
    <div class="radar"></div>

    <script>
        // auth guard
        if (!sessionStorage.getItem('authenticated')) {
            window.location.href='login.html';
        }
        // matrix code copied from hacker.html
        const canvas = document.getElementById('matrix'); const ctx=canvas.getContext('2d');
        canvas.width=window.innerWidth; canvas.height=window.innerHeight;
        const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789$+-*/=%"\'#&_(),.;:?!\\|{}<>[]^~';
        const lettersArray=letters.split(''); const fontSize=14; let columns=canvas.width/fontSize;
        const drops=[]; for(let i=0;i<columns;i++){drops[i]=1;}
        function drawMatrix(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0F0';ctx.font=fontSize+'px monospace';for(let i=0;i<drops.length;i++){const text=lettersArray[Math.floor(Math.random()*lettersArray.length)];ctx.fillText(text,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>canvas.height&&Math.random()>0.975){drops[i]=0;}drops[i]++;}}setInterval(drawMatrix,50);
        window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;columns=canvas.width/fontSize;drops.length=0;for(let i=0;i<columns;i++){drops[i]=1;}});

        // boot typing sequence
        const output=document.getElementById('terminalOutput');
        const input=document.getElementById('terminalInput');
        const seq=[
            'Initializing security protocol...',
            'Ethical Hacker & Cyber Security : ThePhonixXLZ110',
            'Status: Active'
        ];
        let li=0,ci=0;
        function typeLine(){ if(li>=seq.length){enableInput();return;} const line=seq[li]; if(ci<line.length){output.textContent+=line.charAt(ci);ci++;setTimeout(typeLine,50);} else {output.textContent+='\n';li++;ci=0;setTimeout(typeLine,300);} }
        function enableInput(){output.textContent+='\n> '; input.focus();}
        typeLine();

        // simple interactive handler
        input.addEventListener('keydown',function(e){ if(e.key==='Enter'){ const cmd=input.value.trim(); output.textContent+=cmd+'\n'; input.value=''; if(cmd.toLowerCase()==='continue'){ window.location.href='hacker.html'; } else{ output.scrollTop=output.scrollHeight; }} });
    </script>
</body>
</html>
